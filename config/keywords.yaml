# Keywords used to decide whether a listing is "relevant".
# A listing matches if ANY keyword below appears (case-insensitive, substring match)
# in its title, description/snippet, or reference text.
#
# Edit freely - no code changes needed. One keyword per line, under any category.
# Categories are just for your own organization; all of them are searched together.

