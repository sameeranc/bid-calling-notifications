# Keywords used to decide whether a listing is "relevant".
#
# Matching rules:
# - Multi-word phrases (e.g. "data analysis") match case-insensitively, as a
#   whole word/phrase - not buried inside a longer word.
# - Short ALL-CAPS acronyms (e.g. GIS, WHO, SIA, ADB) match case-SENSITIVELY
#   as a whole word. This means "WHO" only matches the literal acronym WHO -
#   not the common English word "who" - and "SIA" won't false-match inside
#   "Asia"/"Asian". Write acronyms in capitals to get this protection; write
#   ordinary phrases in lowercase/title case as normal.
#
# Edit freely - no code changes needed. One keyword per line, under any category.
# Categories are just for your own organization; all of them are searched together.

